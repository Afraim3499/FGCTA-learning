<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B0E14"/>
  
  <text x="400" y="80" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">THE SPREAD (ENTRY COST)</text>

  <!-- Ask Line -->
  <line x1="200" y1="200" x2="600" y2="200" stroke="#6366F1" stroke-width="4"/>
  <text x="610" y="205" fill="#6366F1" font-family="Arial" font-size="18" font-weight="bold">ASK (BUY PRICE)</text>
  
  <!-- Bid Line -->
  <line x1="200" y1="350" x2="600" y2="350" stroke="#94A3B8" stroke-width="4"/>
  <text x="610" y="355" fill="#94A3B8" font-family="Arial" font-size="18" font-weight="bold">BID (SELL PRICE)</text>

  <!-- Spread Gap -->
  <path d="M400 210 L400 340" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8 4"/>
  <path d="M390 210 L410 210 M390 340 L410 340" stroke="#F59E0B" stroke-width="2"/>
  <text x="380" y="280" fill="#F59E0B" font-family="Arial" font-size="16" text-anchor="end" font-weight="bold">THE SPREAD</text>
  
  <text x="400" y="450" fill="#94A3B8" font-family="Arial" font-size="14" text-anchor="middle" font-style="italic">
    You always buy at the higher price and sell at the lower price.
  </text>
</svg>
