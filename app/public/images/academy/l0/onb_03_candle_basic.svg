<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#0B0E14"/>
  <!-- Bullish Candle -->
  <line x1="250" y1="150" x2="250" y2="450" stroke="#10B981" stroke-width="4"/>
  <rect x="200" y="200" width="100" height="200" fill="#10B981"/>
  <text x="250" y="480" fill="#10B981" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">BULLISH</text>
  
  <!-- Bearish Candle -->
  <line x1="550" y1="150" x2="550" y2="450" stroke="#EF4444" stroke-width="4"/>
  <rect x="500" y="250" width="100" height="150" fill="#EF4444"/>
  <text x="550" y="480" fill="#EF4444" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">BEARISH</text>

  <!-- Labels -->
  <text x="180" y="250" fill="#94A3B8" font-family="Arial" font-size="14" text-anchor="end">BODY</text>
  <path d="M190 250 L200 250" stroke="#94A3B8" stroke-width="1"/>
  
  <text x="180" y="160" fill="#94A3B8" font-family="Arial" font-size="14" text-anchor="end">WICK</text>
  <path d="M190 160 L245 160" stroke="#94A3B8" stroke-width="1"/>
  
  <text x="400" y="80" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">CANDLE ANATOMY</text>
</svg>
